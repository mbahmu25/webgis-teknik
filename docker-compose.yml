version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4-alpine
    container_name: postgis_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres  # Ganti password sesuai keinginan
      - POSTGRES_DB=teknik
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: django_api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=1
    depends_on:
      - db
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # Konfigurasi Frontend Vue
  frontend:
    build: ./frontend
    container_name: vue_app
    ports:
      - "8081:80"
    depends_on:
      - backend
volumes:
  postgres_data: